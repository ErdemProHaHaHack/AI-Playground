!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Playground</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--surface3:#22222e;
  --border:rgba(255,255,255,.06);--text:#e8e8ed;--text2:#9999aa;
  --accent:#6c5ce7;--accent2:#a29bfe;--accent-glow:rgba(108,92,231,.15);
  --user-bg:linear-gradient(135deg,#6c5ce7,#4834d4);--ai-bg:#18182a;
  --radius:16px;--radius-sm:10px;
  --sidebar-w:300px;
}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text)}

/* ===== KEY SCREEN ===== */
#key-screen{
  position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;
  background:var(--bg);transition:opacity .4s,visibility .4s;
}
#key-screen.hidden{opacity:0;visibility:hidden;pointer-events:none}
#key-screen .aurora-bg{position:absolute;inset:0;overflow:hidden}
#key-screen .aurora-bg .orb{position:absolute;border-radius:50%;filter:blur(120px);opacity:.25;animation:orbFloat 12s ease-in-out infinite alternate}
#key-screen .aurora-bg .orb:nth-child(1){width:500px;height:500px;background:#6c5ce7;top:-10%;left:-5%}
#key-screen .aurora-bg .orb:nth-child(2){width:400px;height:400px;background:#00cec9;bottom:-10%;right:-5%;animation-delay:-4s}
#key-screen .aurora-bg .orb:nth-child(3){width:300px;height:300px;background:#fd79a8;top:50%;left:50%;animation-delay:-8s}
@keyframes orbFloat{0%{transform:translate(0,0) scale(1)}100%{transform:translate(40px,-30px) scale(1.1)}}

.key-card{
  position:relative;z-index:1;width:420px;max-width:92vw;padding:48px 40px;
  background:rgba(18,18,26,.85);backdrop-filter:blur(30px);
  border-radius:24px;border:1px solid var(--border);
  box-shadow:0 24px 80px rgba(0,0,0,.5);
}
.key-card h1{font-size:28px;font-weight:700;text-align:center;margin-bottom:6px;
  background:linear-gradient(135deg,#e8e8ed,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.key-card .subtitle{text-align:center;color:var(--text2);font-size:14px;margin-bottom:32px}

.provider-toggle{display:flex;gap:8px;margin-bottom:24px;background:var(--surface);border-radius:12px;padding:4px}
.provider-btn{
  flex:1;padding:10px;border:none;border-radius:10px;background:transparent;
  color:var(--text2);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;
}
.provider-btn.active{background:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(108,92,231,.3)}
.provider-btn:hover:not(.active){color:var(--text);background:var(--surface2)}

.key-input-wrap{position:relative;margin-bottom:16px}
.key-input{
  width:100%;padding:14px 48px 14px 16px;background:var(--surface);
  border:1px solid var(--border);border-radius:12px;color:var(--text);
  font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;transition:.2s;
}
.key-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.key-input::placeholder{color:var(--text2)}
.key-toggle-vis{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;
  border:none;color:var(--text2);cursor:pointer;font-size:18px;padding:4px;
}

.key-submit{
  width:100%;padding:14px;border:none;border-radius:12px;
  background:linear-gradient(135deg,#6c5ce7,#4834d4);color:#fff;
  font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:.2s;
}
.key-submit:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(108,92,231,.3)}
.key-submit:active{transform:translateY(0)}
.key-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
.key-error{color:#ff6b6b;font-size:12px;text-align:center;margin-top:12px;display:none}

/* ===== MAIN APP ===== */
#app{display:flex;height:100vh;opacity:0;transition:opacity .4s}
#app.visible{opacity:1}

/* Aurora BG */
.aurora-wrap{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.aurora-wrap .orb{position:absolute;border-radius:50%;filter:blur(140px);opacity:.12;animation:orbFloat 20s ease-in-out infinite alternate}
.aurora-wrap .orb:nth-child(1){width:600px;height:600px;background:#6c5ce7;top:-15%;left:-10%}
.aurora-wrap .orb:nth-child(2){width:500px;height:500px;background:#00cec9;bottom:-15%;right:-10%;animation-delay:-7s}
.aurora-wrap .orb:nth-child(3){width:350px;height:350px;background:#fd79a8;top:40%;left:45%;animation-delay:-13s}

/* Sidebar */
.sidebar-overlay{
  position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.5);opacity:0;
  visibility:hidden;transition:.3s;
}
.sidebar-overlay.open{opacity:1;visibility:visible}
.sidebar{
  position:fixed;top:0;left:0;width:var(--sidebar-w);height:100%;
  background:var(--surface);border-right:1px solid var(--border);
  transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;z-index:101;
}
.sidebar-overlay.open .sidebar{transform:translateX(0)}
.sidebar-header{padding:20px 20px 16px;display:flex;align-items:center;justify-content:space-between}
.sidebar-header h2{font-size:16px;font-weight:700}
.sidebar-close{
  width:32px;height:32px;border-radius:8px;border:none;background:var(--surface2);
  color:var(--text2);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:.2s;
}
.sidebar-close:hover{background:var(--surface3);color:var(--text)}
.new-chat-btn{
  margin:0 16px 12px;padding:12px;border-radius:12px;border:1px dashed var(--border);
  background:transparent;color:var(--text2);font-family:inherit;font-size:13px;font-weight:500;
  cursor:pointer;transition:.2s;display:flex;align-items:center;gap:8px;justify-content:center;
}
.new-chat-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
.chat-list{flex:1;overflow-y:auto;padding:0 12px 12px}
.chat-list::-webkit-scrollbar{width:4px}
.chat-list::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}
.chat-item{
  padding:12px 14px;border-radius:10px;cursor:pointer;transition:.15s;
  margin-bottom:4px;display:flex;align-items:center;gap:10px;
}
.chat-item:hover{background:var(--surface2)}
.chat-item.active{background:var(--accent-glow);color:var(--accent2)}
.chat-item .chat-title{flex:1;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-item .chat-delete{
  opacity:0;border:none;background:none;color:var(--text2);cursor:pointer;
  font-size:14px;padding:2px 4px;border-radius:4px;transition:.15s;
}
.chat-item:hover .chat-delete{opacity:1}
.chat-item .chat-delete:hover{color:#ff6b6b;background:rgba(255,107,107,.1)}

/* Main content */
.main{flex:1;display:flex;flex-direction:column;position:relative;z-index:1;min-width:0}

/* Topbar */
.topbar{
  display:flex;align-items:center;gap:12px;padding:12px 20px;
  background:transparent;position:relative;z-index:10;
}
.hamburger{
  width:36px;height:36px;border-radius:10px;border:none;background:var(--surface2);
  color:var(--text);cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;transition:.2s;flex-shrink:0;
}
.hamburger span{display:block;width:18px;height:2px;background:currentColor;border-radius:1px;transition:.2s}
.hamburger:hover{background:var(--surface3)}
.topbar-center{flex:1;text-align:center}
.topbar-title{font-size:15px;font-weight:600;color:var(--text)}
.topbar-model{font-size:11px;color:var(--text2);margin-top:2px}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.topbar-btn{
  width:36px;height:36px;border-radius:10px;border:none;background:var(--surface2);
  color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:.2s;font-size:16px;
}
.topbar-btn:hover{background:var(--surface3);color:var(--text)}
.topbar-btn.active{color:var(--accent)}

/* Model selector dropdown */
.model-dropdown-wrap{position:relative}
.model-dropdown{
  position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);
  width:340px;max-height:420px;background:var(--surface);border:1px solid var(--border);
  border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.5);overflow:hidden;
  display:none;z-index:200;
}
.model-dropdown.open{display:block}
.model-search{
  padding:14px 16px;border-bottom:1px solid var(--border);
}
.model-search input{
  width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:.2s;
}
.model-search input:focus{border-color:var(--accent)}
.model-search input::placeholder{color:var(--text2)}
.model-list{max-height:340px;overflow-y:auto;padding:8px}
.model-list::-webkit-scrollbar{width:4px}
.model-list::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}
.model-section-label{font-size:11px;font-weight:600;color:var(--text2);padding:8px 12px 4px;text-transform:uppercase;letter-spacing:.5px}
.model-option{
  padding:10px 12px;border-radius:10px;cursor:pointer;display:flex;align-items:center;
  gap:12px;transition:.15s;
}
.model-option:hover{background:var(--surface2)}
.model-option.active{background:var(--accent-glow);color:var(--accent2)}
.model-option .model-icon{
  width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;flex-shrink:0;
}
.model-option .model-info{flex:1;min-width:0}
.model-option .model-name{font-size:13px;font-weight:500}
.model-option .model-desc{font-size:11px;color:var(--text2);margin-top:1px}

/* Messages */
.messages{
  flex:1;overflow-y:auto;padding:20px 20px 8px;
  background:transparent;
}
.messages::-webkit-scrollbar{width:5px}
.messages::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}

.message{display:flex;gap:12px;margin-bottom:20px;animation:msgIn .3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.message.user{flex-direction:row-reverse}
.message-avatar{
  width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:13px;font-weight:600;margin-top:2px;
}
.message.ai .message-avatar{background:var(--accent-glow);color:var(--accent2)}
.message.user .message-avatar{background:var(--surface3);color:var(--text2)}
.message-bubble{
  max-width:72%;padding:14px 18px;border-radius:var(--radius);font-size:14px;
  line-height:1.7;word-break:break-word;
}
.message.ai .message-bubble{background:var(--ai-bg);border:1px solid var(--border)}
.message.user .message-bubble{background:var(--user-bg);color:#fff}
.message-bubble pre{
  margin:10px 0 4px;padding:14px;background:#0d0d14;border-radius:var(--radius-sm);
  overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.6;
}
.message-bubble code:not(pre code){
  padding:2px 6px;background:rgba(108,92,231,.15);border-radius:4px;
  font-family:'JetBrains Mono',monospace;font-size:12.5px;
}
.message.user .message-bubble code:not(pre code){background:rgba(255,255,255,.2)}
.message-bubble p{margin-bottom:8px}
.message-bubble p:last-child{margin-bottom:0}
.message-bubble ul,.message-bubble ol{padding-left:20px;margin:8px 0}
.message-bubble li{margin:4px 0}
.message-bubble h1,.message-bubble h2,.message-bubble h3{margin:12px 0 6px}
.message-bubble table{border-collapse:collapse;margin:10px 0;font-size:13px}
.message-bubble th,.message-bubble td{border:1px solid var(--border);padding:8px 12px;text-align:left}
.message-bubble th{background:var(--surface2);font-weight:600}
.message-bubble blockquote{border-left:3px solid var(--accent);padding-left:14px;color:var(--text2);margin:8px 0}

/* Typing indicator */
.typing-indicator{display:flex;gap:5px;padding:14px 18px;align-items:center}
.typing-dot{
  width:7px;height:7px;background:var(--text2);border-radius:50%;
  animation:typingBounce 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2){animation-delay:.15s}
.typing-dot:nth-child(3){animation-delay:.3s}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* Input area */
.input-area{
  padding:16px 20px 20px;background:transparent;position:relative;z-index:10;
}
.input-wrap{
  display:flex;align-items:flex-end;gap:10px;background:var(--surface);
  border:1px solid var(--border);border-radius:16px;padding:8px 8px 8px 18px;
  transition:.2s;
}
.input-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
#msg-input{
  flex:1;background:transparent;border:none;color:var(--text);font-family:inherit;
  font-size:14px;line-height:1.5;resize:none;outline:none;max-height:160px;
  min-height:24px;padding:8px 0;
}
#msg-input::placeholder{color:var(--text2)}
.send-btn{
  width:40px;height:40px;border-radius:12px;border:none;
  background:linear-gradient(135deg,#6c5ce7,#4834d4);color:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:.2s;flex-shrink:0;
}
.send-btn:hover{transform:scale(1.05);box-shadow:0 4px 16px rgba(108,92,231,.3)}
.send-btn:active{transform:scale(.97)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.send-btn svg{width:18px;height:18px}

/* Code overlay */
.code-overlay{
  position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.8);
  display:none;align-items:center;justify-content:center;padding:40px;
}
.code-overlay.open{display:flex}
.code-panel{
  width:90%;max-width:900px;max-height:85vh;background:var(--surface);
  border-radius:20px;border:1px solid var(--border);overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,.6);display:flex;flex-direction:column;
}
.code-panel-header{
  display:flex;align-items:center;justify-content:space-between;padding:16px 20px;
  border-bottom:1px solid var(--border);
}
.code-panel-header h3{font-size:14px;font-weight:600}
.code-panel-close{
  width:32px;height:32px;border-radius:8px;border:none;background:var(--surface2);
  color:var(--text2);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;
}
.code-panel-close:hover{background:var(--surface3);color:var(--text)}
.code-panel-body{flex:1;overflow:auto;padding:20px}
.code-panel-body pre{margin:0;border-radius:10px}
.code-panel-body pre code{font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.7}

/* Settings panel */
.settings-overlay{
  position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);opacity:0;
  visibility:hidden;transition:.3s;
}
.settings-overlay.open{opacity:1;visibility:visible}
.settings-panel{
  position:fixed;top:0;right:0;width:360px;height:100%;
  background:var(--surface);border-left:1px solid var(--border);
  transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;z-index:201;
}
.settings-overlay.open .settings-panel{transform:translateX(0)}
.settings-header{
  display:flex;align-items:center;justify-content:space-between;padding:20px;
  border-bottom:1px solid var(--border);
}
.settings-header h2{font-size:16px;font-weight:700}
.settings-body{flex:1;overflow-y:auto;padding:20px}
.setting-group{margin-bottom:24px}
.setting-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.setting-input{
  width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:.2s;
}
.setting-input:focus{border-color:var(--accent)}
.setting-input::placeholder{color:var(--text2)}
textarea.setting-input{min-height:80px;resize:vertical;font-family:inherit;line-height:1.5}
.temp-values{display:flex;gap:6px;flex-wrap:wrap}
.temp-val{
  padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);
  color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:.2s;
}
.temp-val.active{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
.temp-val:hover:not(.active){border-color:var(--text2)}

/* Settings gear icon */
.gear-svg{width:18px;height:18px}

/* Welcome screen */
.welcome{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:40px;
}
.welcome h2{font-size:26px;font-weight:700;margin-bottom:8px;
  background:linear-gradient(135deg,#e8e8ed,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.welcome p{color:var(--text2);font-size:14px;max-width:400px;line-height:1.6}
.welcome-cards{display:flex;gap:12px;margin-top:32px;flex-wrap:wrap;justify-content:center}
.welcome-card{
  padding:16px 20px;background:var(--surface);border:1px solid var(--border);
  border-radius:14px;cursor:pointer;transition:.2s;text-align:left;max-width:200px;
}
.welcome-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.2)}
.welcome-card .wc-icon{font-size:20px;margin-bottom:8px}
.welcome-card .wc-title{font-size:13px;font-weight:600;margin-bottom:4px}
.welcome-card .wc-desc{font-size:11px;color:var(--text2);line-height:1.4}

/* Fullscreen */
:fullscreen .messages::-webkit-scrollbar{width:6px}

/* Scrollbar global */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}

/* Responsive */
@media(max-width:600px){
  .key-card{padding:32px 24px}
  .message-bubble{max-width:88%}
  .model-dropdown{width:calc(100vw - 40px);left:0;transform:none}
  .settings-panel{width:100%}
}
</style>
</head>
<body>

<!-- KEY SCREEN -->
<div id="key-screen">
  <div class="aurora-bg">
    <div class="orb"></div><div class="orb"></div><div class="orb"></div>
  </div>
  <div class="key-card">
    <h1>AI Playground</h1>
    <p class="subtitle">Enter your API key to get started</p>
    <div class="provider-toggle">
      <button class="provider-btn active" data-provider="groq">Groq</button>
      <button class="provider-btn" data-provider="openrouter">OpenRouter</button>
    </div>
    <div class="key-input-wrap">
      <input type="password" class="key-input" id="api-key-input" placeholder="gsk_... or sk-or-...">
      <button class="key-toggle-vis" id="toggle-vis">👁</button>
    </div>
    <button class="key-submit" id="key-submit" disabled>Launch Playground</button>
    <p class="key-error" id="key-error"></p>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="aurora-wrap">
    <div class="orb"></div><div class="orb"></div><div class="orb"></div>
  </div>

  <!-- Sidebar overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay">
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>Chats</h2>
        <button class="sidebar-close" id="sidebar-close">✕</button>
      </div>
      <button class="new-chat-btn" id="new-chat-btn">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
        New Chat
      </button>
      <div class="chat-list" id="chat-list"></div>
    </div>
  </div>

  <!-- Settings overlay -->
  <div class="settings-overlay" id="settings-overlay">
    <div class="settings-panel">
      <div class="settings-header">
        <h2>Settings</h2>
        <button class="sidebar-close" id="settings-close">✕</button>
      </div>
      <div class="settings-body">
        <div class="setting-group">
          <div class="setting-label">Temperature</div>
          <div class="temp-values" id="temp-values">
            <div class="temp-val" data-val="0">0</div>
            <div class="temp-val" data-val="0.3">0.3</div>
            <div class="temp-val active" data-val="0.7">0.7</div>
            <div class="temp-val" data-val="1">1</div>
            <div class="temp-val" data-val="1.5">1.5</div>
          </div>
        </div>
        <div class="setting-group">
          <div class="setting-label">System Prompt</div>
          <textarea class="setting-input" id="system-prompt" placeholder="You are a helpful assistant..."></textarea>
        </div>
        <div class="setting-group">

// ===== FORMATTING =====
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatContent(text) {
  if(!text) return '';
  // Process code blocks
  let html = text.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
    const highlighted = hljs.highlightAuto(code, lang ? [lang] : undefined).value;
    return `<pre><code class="hljs">${highlighted}</code></pre>`;
  });
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Blockquotes
  html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  // Horizontal rules
  html = html.replace(/^---$/gm, '<hr style="border:none;border-top:1px solid var(--border);margin:12px 0">');
  // Unordered lists
  html = html.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>');
  // Ordered lists
  html = html.replace(/^\d+\. (.+)$/gm, '<oli>$1</oli>');
  html = html.replace(/(<oli>.*<\/oli>)/gs, (m) => {
    return '<ol>' + m.replace(/<\/?oli>/g, (t) => t.replace('oli', 'li')) + '</ol>';
  });
  // Paragraphs for line breaks
  html = html.replace(/\n\n/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');
  html = '<p>' + html + '</p>';
  // Clean empty paragraphs
  html = html.replace(/<p><\/p>/g, '');
  html = html.replace(/<p>(<h[1-3]>)/g, '$1');
  html = html.replace(/(<\/h[1-3]>)<\/p>/g, '$1');
  html = html.replace(/<p>(<pre>)/g, '$1');
  html = html.replace(/(<\/pre>)<\/p>/g, '$1');
  html = html.replace(/<p>(<ul>)/g, '$1');
  html = html.replace(/(<\/ul>)<\/p>/g, '$1');
  html = html.replace(/<p>(<ol>)/g, '$1');
  html = html.replace(/(<\/ol>)<\/p>/g, '$1');
  html = html.replace(/<p>(<blockquote>)/g, '$1');
  html = html.replace(/(<\/blockquote>)<\/p>/g, '$1');
  html = html.replace(/<p>(<hr[^>]*>)/g, '$1');
  html = html.replace(/(<hr[^>]*>)<\/p>/g, '$1');
  return html;
}

// ===== CODE DETECTION =====
function detectAndShowCode(text) {
  const match = text.match(/```(\w*)\n([\s\S]*?)```/);
  if(match) {
    const lang = match[1] || 'plaintext';
    const code = match[2].trim();
    codeLangLabel.textContent = lang.toUpperCase();
    codePanelContent.textContent = code;
    codePanelContent.className = '';
    try { hljs.highlightElement(codePanelContent); } catch(e) {}
    codeOverlay.classList.add('open');
  }
}

codeOverlayClose.addEventListener('click', () => codeOverlay.classList.remove('open'));
codeOverlay.addEventListener('click', (e) => {
  if(e.target === codeOverlay) codeOverlay.classList.remove('open');
});

// ===== STREAMING =====
async function sendMessage() {
  const text = msgInput.value.trim();
  if(!text || isGenerating) return;

  const chat = getCurrentChat();
  if(!chat) return;

  // Add user message
  chat.messages.push({role:'user', content:text});
  if(chat.messages.length === 1) {
    chat.title = text.slice(0, 50) + (text.length > 50 ? '...' : '');
    topbarTitle.textContent = chat.title;
    renderChatList();
  }

  appendMessageEl('user', text);
  msgInput.value = '';
  autoResize();
  sendBtn.disabled = true;

  // Build API messages
  const apiMessages = [];
  if(settings.systemPrompt) apiMessages.push({role:'system', content:settings.systemPrompt});
  if(settings.contextOn) {
    apiMessages.push(...chat.messages);
  } else {
    apiMessages.push(chat.messages[chat.messages.length - 1]);
  }

  const endpoint = provider === 'groq'
    ? 'https://api.groq.com/openai/v1/chat/completions'
    : 'https://openrouter.ai/api/v1/chat/completions';

  const body = {
    model: selectedModel,
    messages: apiMessages,
    temperature: settings.temperature,
    max_tokens: settings.maxTokens,
    top_p: settings.topP,
    stream: true,
  };

  isGenerating = true;
  abortCtrl = new AbortController();
  showTypingIndicator();
  scrollToBottom();

  let fullResponse = '';
  let bubble = null;

  try {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`,
        ...(provider === 'openrouter' ? {'HTTP-Referer': window.location.href, 'X-Title': 'AI Playground'} : {}),
      },
      body: JSON.stringify(body),
      signal: abortCtrl.signal,
    });

    if(!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.error?.message || `API error ${res.status}`);
    }

    removeTypingIndicator();
    bubble = appendStreamingMessage();

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while(true) {
      const {done, value} = await reader.read();
      if(done) break;
      buffer += decoder.decode(value, {stream:true});

      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for(const line of lines) {
        if(!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if(data === '[DONE]') continue;
        try {
          const json = JSON.parse(data);
          const delta = json.choices?.[0]?.delta?.content;
          if(delta) {
            fullResponse += delta;
            // Streaming: append token directly, never rebuild
            bubble.innerHTML = formatContent(fullResponse);
            scrollToBottom();
          }
        } catch(e) {}
      }
    }
  } catch(err) {
    removeTypingIndicator();
    if(err.name === 'AbortError') {
      if(bubble) bubble.innerHTML = formatContent(fullResponse + '\n\n*[Generation stopped]*');
    } else {
      if(bubble) bubble.innerHTML = `<p style="color:#ff6b6b">Error: ${esc(err.message)}</p>`;
      else appendMessageEl('ai', `Error: ${err.message}`);
    }
  } finally {
    isGenerating = false;
    abortCtrl = null;
    sendBtn.disabled = false;
    removeTypingIndicator();

    if(fullResponse) {
      chat.messages.push({role:'assistant', content:fullResponse});
      saveChats();
      detectAndShowCode(fullResponse);
    }
    scrollToBottom();
  }
}

// ===== INPUT =====
function autoResize() {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 160) + 'px';
}

msgInput.addEventListener('input', () => {
  autoResize();
  sendBtn.disabled = !msgInput.value.trim();
});

msgInput.addEventListener('keydown', (e) => {
  if(e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ===== CLICK OUTSIDE CLOSE =====
document.addEventListener('click', (e) => {
  if(!modelDropdown.contains(e.target) && !modelToggle.contains(e.target)) {
    modelDropdown.classList.remove('open');
  }
});

})();
</script>
